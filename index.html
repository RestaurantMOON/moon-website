<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOON – Coming Soon</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #0d2245, #050d1f);
      color: #f5f1e8;
      font-family: 'Georgia', serif;
      text-align: center;
      overflow: hidden;
    }

    /* STATIC STARS */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(white 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.3;
    }

    /* SHOOTING STAR */
    .shooting-star {
      position: absolute;
      width: 2px;
      height: 100px;
      background: linear-gradient(-45deg, #f2c94c, transparent);
      opacity: 0.8;
      transform: rotate(45deg);
      animation: shoot 5s linear infinite;
    }

    .shooting-star:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
    .shooting-star:nth-child(2) { top: 30%; left: 70%; animation-delay: 2s; }
    .shooting-star:nth-child(3) { top: 60%; left: 40%; animation-delay: 4s; }

    @keyframes shoot {
      0% { transform: translate(0, 0) rotate(45deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translate(400px, 400px) rotate(45deg); opacity: 0; }
    }

    /* COMET */
    .comet {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #f2c94c;
      border-radius: 50%;
      box-shadow: 0 0 15px #f2c94c;
      animation: cometMove 12s linear infinite;
    }

    @keyframes cometMove {
      0% { top: 80%; left: -10%; }
      100% { top: 20%; left: 110%; }
    }

    /* CONSTELLATIONS */
    .constellation {
      position: absolute;
      width: 200px;
      height: 200px;
      top: 15%;
      left: 75%;
      opacity: 0.4;
    }

    .constellation span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
    }

    .constellation span:nth-child(1) { top: 10%; left: 20%; }
    .constellation span:nth-child(2) { top: 30%; left: 50%; }
    .constellation span:nth-child(3) { top: 60%; left: 30%; }
    .constellation span:nth-child(4) { top: 80%; left: 70%; }

    .constellation::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px dashed rgba(255,255,255,0.1);
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 500px;
    }

    /* GLOWING MOON */
    .moon {
      font-size: 70px;
      margin-bottom: 20px;
      color: #f2c94c;
      text-shadow:
        0 0 10px #f2c94c,
        0 0 20px #f2c94c,
        0 0 40px #f2c94c;
      animation: glow 2.5s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #f2c94c, 0 0 20px #f2c94c; }
      to { text-shadow: 0 0 20px #f2c94c, 0 0 40px #f2c94c, 0 0 60px #f2c94c; }
    }

    h1 {
      font-size: 52px;
      margin: 10px 0;
      letter-spacing: 4px;
    }

    h2 {
      font-size: 28px;
      margin: 0 0 20px;
      font-weight: normal;
      opacity: 0.9;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .insta {
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid #f2c94c;
      color: #f2c94c;
      text-decoration: none;
      border-radius: 30px;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .insta:hover {
      background: #f2c94c;
      color: #0b1e3a;
      box-shadow: 0 0 15px #f2c94c;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      font-size: 13px;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <div class="comet"></div>

  <div class="constellation">
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <div class="moon">🌙</div>
    <h1>MOON</h1>
    <h2>მთვარე</h2>

    <p>Restaurant • Lounge • Culture</p>

    <p><strong>Coming Soon</strong></p>

    <a class="insta" href="https://www.instagram.com/restaurant_mtvare/" target="_blank">
      Follow us on Instagram
    </a>
  </div>

  <div class="footer">
    Some nights aren’t lived — they’re felt 🌙
  </div>
</body>
</html>
